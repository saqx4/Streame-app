name: streame_tv
description: "Streame TV app — Android TV (leanback)."
publish_to: 'none'

version: 2.3.0+24

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  streame:
    path: ../../
  streame_core:
    path: ../core

  # Adjusted to current stable versions
  flutter_inappwebview: ^6.0.0
  shared_preferences: ^2.3.0
  media_kit: ^1.1.0
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.0
  connectivity_plus: ^7.1.1
  url_launcher: ^6.2.0
  android_intent_plus: ^5.0.0
  flutter_secure_storage: ^9.0.0
  flutter_riverpod: ^2.5.0
  permission_handler: ^11.0.0
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/