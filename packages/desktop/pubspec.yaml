name: streame_desktop
description: "Streame desktop app — Windows + Linux + macOS."
publish_to: 'none'

version: 2.0.1+20

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  streame:
    path: ../../
  streame_core:
    path: ../core

  window_manager: ^0.5.1
  shared_preferences: ^2.5.2
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  connectivity_plus: ^7.0.0
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.3.1
  flutter_secure_storage: ^9.2.4
  flutter_riverpod: ^2.6.1
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 48

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
