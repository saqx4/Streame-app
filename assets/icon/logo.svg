<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#161622"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>

  <!-- Outer glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glowGrad)"/>

  <!-- Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#ringGrad)" stroke-width="6" filter="url(#glow)"/>

  <!-- Inner subtle ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#6366F1" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Play arrow -->
  <path d="M220 176 L220 336 L340 256 Z" fill="url(#arrowGrad)" filter="url(#glow)"/>

  <!-- Play arrow highlight edge -->
  <path d="M220 176 L220 336 L230 328 L230 184 Z" fill="#A78BFA" opacity="0.3"/>
</svg>
