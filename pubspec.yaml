name: streame
description: "Streame TV - Flutter rewrite"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Routing
  go_router: ^14.8.1
  
  # HTTP & API
  http: ^1.3.0
  
  # Video Player (media_kit with libmpv)
  media_kit: ^1.1.0
  media_kit_video: ^1.2.0
  media_kit_libs_video: ^1.0.0
  
  # Native torrent engine (libtorrent 2.0 with built-in HTTP streaming)
  libtorrent_flutter: ^1.8.5
  
  # Image caching
  cached_network_image: ^3.4.1

  # Pure-Dart image decoding (fallback for emulators with broken native decoder)
  image: ^4.0.0
  
  # Local Storage  
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # URL Launcher (Trakt OAuth, etc.)
  url_launcher: ^6.3.1

  # Utils
  equatable: ^2.0.7
  collection: ^1.19.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  
  # JSON
  json_annotation: ^4.9.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/