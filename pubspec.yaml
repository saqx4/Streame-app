name: streame
description: "Streame shared screens library."
publish_to: 'none'

version: 2.0.2+21

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  streame_core:
    path: packages/core

  # Directly imported in screens (required by depend_on_referenced_packages lint)
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.2
  flutter_inappwebview: ^6.1.5
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  url_launcher: ^6.3.1
  flutter_riverpod: ^2.6.1
  media_kit: ^1.2.6
  media_kit_video: ^2.0.2
  connectivity_plus: ^7.0.0
  window_manager: ^0.5.1
  libtorrent_flutter: 1.7.8
  file_picker: ^8.0.0+1
  wakelock_plus: ^1.4.0
  screen_brightness: ^2.1.7
  shared_preferences: ^2.5.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true