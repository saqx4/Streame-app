# ──────────────────────────────────────────────────────────────────────────────
#  PlayTorrio — Multi-Platform CI/CD
#  Builds: Android (split APK), Windows (installer), Linux x64 (AppImage),
#          macOS ARM64 (Apple Silicon)
#  TorrServer is downloaded fresh from GitHub releases during each build.
# ──────────────────────────────────────────────────────────────────────────────
name: Build PlayTorrio

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FLUTTER_CHANNEL: stable
  TORRSERVER_REPO: YouROK/TorrServer

# ═══════════════════════════════════════════════════════════════════════════════
jobs:

  # ─── Android ──────────────────────────────────────────────────────────────
  # Android builds are done manually and uploaded to releases

  # ─── Windows ──────────────────────────────────────────────────────────────
  windows:
    name:  Windows (Installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Download TorrServer
        shell: pwsh
        run: |
          $torrUrl = "https://github.com/${{ env.TORRSERVER_REPO }}/releases/latest/download"
          New-Item -ItemType Directory -Force -Path assets\bin\windows | Out-Null
          Write-Host "Downloading TorrServer-windows-amd64.exe ..."
          Invoke-WebRequest "$torrUrl/TorrServer-windows-amd64.exe" -OutFile assets\bin\windows\TorrServer.exe

      - name: Enable Windows TorrServer asset
        shell: pwsh
        run: |
          (Get-Content pubspec.yaml -Raw) `
            -replace '#- assets/bin/windows/TorrServer\.exe', '- assets/bin/windows/TorrServer.exe' |
            Set-Content pubspec.yaml -NoNewline

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows\setup.iss

      - uses: actions/upload-artifact@v4
        with:
          name: PlayTorrio-Windows-Installer
          path: installer/windows/Output/PlayTorrio-Windows-Setup.exe

