# ──────────────────────────────────────────────────────────────────────────────
#  PlayTorrio — Multi-Platform CI/CD
#  Builds: Android (split APK), Windows (installer), Linux x64 (AppImage),
#          macOS ARM64 (Apple Silicon), iOS (IPA — sideload)
# ──────────────────────────────────────────────────────────────────────────────
name: Build PlayTorrio

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FLUTTER_CHANNEL: stable

# ═══════════════════════════════════════════════════════════════════════════════
jobs:

  # ─── Android ──────────────────────────────────────────────────────────────
  # Android builds are done manually and uploaded to releases

  # ─── Windows ──────────────────────────────────────────────────────────────
  windows:
    name:  Windows (Installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows\setup.iss

      - uses: actions/upload-artifact@v4
        with:
          name: PlayTorrio-Windows-Installer
          path: installer/windows/Output/PlayTorrio-Windows-Setup.exe

