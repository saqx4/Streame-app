# ──────────────────────────────────────────────────────────────────────────────
#  Streame — Multi-Platform CI/CD
#  Builds: Android (split APK), Windows (installer), Linux x64 (AppImage),
#          macOS ARM64 (Apple Silicon), iOS (IPA — sideload)
# ──────────────────────────────────────────────────────────────────────────────
name: Build Streame

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FLUTTER_CHANNEL: stable

# ═══════════════════════════════════════════════════════════════════════════════
jobs:

  # ─── Android ──────────────────────────────────────────────────────────────
  # Android builds are done manually and uploaded to releases

  # ─── Windows ──────────────────────────────────────────────────────────────
  windows:
    name:  Windows (Installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - run: flutter pub get
        working-directory: packages/desktop
      - run: >
          flutter build windows --release
          --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }}
          --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}
          --dart-define=SIMKL_CLIENT_ID=${{ secrets.SIMKL_CLIENT_ID }}
          --dart-define=SIMKL_CLIENT_SECRET=${{ secrets.SIMKL_CLIENT_SECRET }}
        working-directory: packages/desktop

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows\setup.iss

      - uses: actions/upload-artifact@v4
        with:
          name: Streame-Windows-Installer
          path: installer/windows/Output/Streame-Windows-Setup.exe

  # ─── Linux x64 ───────────────────────────────────────────────────────────
  linux-x64:
    name:  Linux x64 (AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libmpv-dev libsecret-1-dev libjsoncpp-dev \
            libwebkit2gtk-4.1-dev \
            libfuse2

      - name: Generate Linux platform files
        run: |
          flutter create --platforms=linux .

          # Fix binary name & window title
          sed -i 's/set(BINARY_NAME "play_torrio_native")/set(BINARY_NAME "Streame")/' \
            linux/CMakeLists.txt
          sed -i 's/set(APPLICATION_ID "com.example.play_torrio_native")/set(APPLICATION_ID "com.streame.app")/' \
            linux/CMakeLists.txt

          # Fix application name in my_application.cc if it exists
          if [ -f "linux/my_application.cc" ]; then
            sed -i 's/play_torrio_native/Streame/g' linux/my_application.cc
          fi

      - run: flutter pub get
        working-directory: packages/desktop
      - run: >
          flutter build linux --release
          --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }}
          --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}
          --dart-define=SIMKL_CLIENT_ID=${{ secrets.SIMKL_CLIENT_ID }}
          --dart-define=SIMKL_CLIENT_SECRET=${{ secrets.SIMKL_CLIENT_SECRET }}
        working-directory: packages/desktop

      - name: Package as AppImage
        run: |
          # Download appimagetool
          curl -fSL "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -o appimagetool
          chmod +x appimagetool

          # Create AppDir from Flutter bundle
          APP=Streame.AppDir
          mkdir -p "$APP"
          cp -r packages/desktop/build/linux/x64/release/bundle/* "$APP/"
          cp packages/mobile/assets/icon/icon.png "$APP/Streame.png"
          cp installer/linux/Streame.desktop "$APP/"

          # AppRun launcher
          printf '#!/bin/bash\ncd "$(dirname "$0")"\nexec ./Streame "$@"\n' \
            > "$APP/AppRun"
          chmod +x "$APP/AppRun"

          # Build the AppImage
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run \
            "$APP" Streame-Linux-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: Streame-Linux-x64
          path: Streame-Linux-x86_64.AppImage

  # ─── macOS ARM64 (Apple Silicon) ─────────────────────────────────────────
  macos-arm64:
    name:  macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Configure macOS platform files
        run: |
          # Regenerate platform scaffolding only if macos/ folder is missing
          if [ ! -d "macos" ]; then
            flutter create --platforms=macos .
          fi

          # ── Entitlements ──
          for f in macos/Runner/DebugProfile.entitlements macos/Runner/Release.entitlements; do
            # Disable sandbox
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.app-sandbox" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.app-sandbox bool false" "$f"

            # Hardened runtime: allow JIT (Flutter engine needs this)
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.cs.allow-jit" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.cs.allow-jit bool true" "$f"

            # Network: client (torrent peer connections + API calls)
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.network.client" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.client bool true" "$f"

            # Network: server (libtorrent HTTP stream server)
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.network.server" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.server bool true" "$f"
          done

          # ── App name ──
          /usr/libexec/PlistBuddy -c "Set :CFBundleName Streame" \
            macos/Runner/Info.plist || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleName string Streame" \
            macos/Runner/Info.plist

      - run: flutter pub get
        working-directory: packages/mobile
      - run: >
          flutter build macos --release
          --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }}
          --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}
          --dart-define=SIMKL_CLIENT_ID=${{ secrets.SIMKL_CLIENT_ID }}
          --dart-define=SIMKL_CLIENT_SECRET=${{ secrets.SIMKL_CLIENT_SECRET }}
        working-directory: packages/mobile

      - name: Package as DMG
        run: |
          cd packages/mobile/build/macos/Build/Products/Release
          mv play_torrio_native.app Streame.app

          codesign --sign - --force --deep Streame.app

          mkdir -p dmg_temp
          cp -R Streame.app dmg_temp/
          ln -s /Applications dmg_temp/Applications

          hdiutil create -volname "Streame" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            ../../../../../Streame-macOS-arm64.dmg

          zip -ry ../../../../../Streame-macOS-arm64.zip Streame.app

      - uses: actions/upload-artifact@v4
        with:
          name: Streame-macOS-arm64
          path: |
            Streame-macOS-arm64.dmg
            Streame-macOS-arm64.zip

  # ─── macOS Intel (x86_64 via Rosetta 2) ─────────────────────────────────
  # GitHub no longer offers Intel macOS runners (macos-13 deprecated).
  # We cross-compile on the ARM64 runner using Rosetta 2 + x64 Flutter SDK.
  macos-intel:
    name:  macOS (Intel)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rosetta 2
        run: softwareupdate --install-rosetta --agree-to-license || true

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          architecture: x64

      - name: Configure macOS platform files
        run: |
          if [ ! -d "macos" ]; then
            flutter create --platforms=macos .
          fi

          for f in macos/Runner/DebugProfile.entitlements macos/Runner/Release.entitlements; do
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.app-sandbox" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.app-sandbox bool false" "$f"
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.cs.allow-jit" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.cs.allow-jit bool true" "$f"
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.network.client" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.client bool true" "$f"
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.network.server" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.server bool true" "$f"
          done

          /usr/libexec/PlistBuddy -c "Set :CFBundleName Streame" \
            macos/Runner/Info.plist || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleName string Streame" \
            macos/Runner/Info.plist

      - run: arch -x86_64 flutter pub get
        working-directory: packages/mobile
      - run: >
          arch -x86_64 flutter build macos --release
          --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }}
          --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}
          --dart-define=SIMKL_CLIENT_ID=${{ secrets.SIMKL_CLIENT_ID }}
          --dart-define=SIMKL_CLIENT_SECRET=${{ secrets.SIMKL_CLIENT_SECRET }}
        working-directory: packages/mobile

      - name: Package as DMG
        run: |
          cd packages/mobile/build/macos/Build/Products/Release
          mv play_torrio_native.app Streame.app

          codesign --sign - --force --deep Streame.app

          mkdir -p dmg_temp
          cp -R Streame.app dmg_temp/
          ln -s /Applications dmg_temp/Applications

          hdiutil create -volname "Streame" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            ../../../../../Streame-macOS-intel.dmg

          zip -ry ../../../../../Streame-macOS-intel.zip Streame.app

      - uses: actions/upload-artifact@v4
        with:
          name: Streame-macOS-intel
          path: |
            Streame-macOS-intel.dmg
            Streame-macOS-intel.zip

  # ─── iOS (Sideloadable IPA — no signing) ─────────────────────────────────
  ios:
    name:  iOS (IPA)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Generate iOS platform files
        working-directory: packages/mobile
        run: |
          if [ ! -d "ios" ]; then
            flutter create --platforms=ios .
          fi

          # ── Set bundle ID & display name ──
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.streame.app" \
            ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string com.streame.app" \
            ios/Runner/Info.plist

          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Streame" \
            ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Streame" \
            ios/Runner/Info.plist

          /usr/libexec/PlistBuddy -c "Set :CFBundleName Streame" \
            ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleName string Streame" \
            ios/Runner/Info.plist

          # ── Allow localhost networking (libtorrent local HTTP server) ──
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" \
            ios/Runner/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSAllowsLocalNetworking true" \
            ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsLocalNetworking bool true" \
            ios/Runner/Info.plist

          # ── Network entitlements for libtorrent_flutter ──
          cat > ios/Runner/Runner.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>com.apple.security.network.client</key>
          	<true/>
          </dict>
          </plist>
          EOF

      - run: flutter pub get
        working-directory: packages/mobile
      - run: >
          flutter build ios --release --no-codesign
          --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }}
          --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}
          --dart-define=SIMKL_CLIENT_ID=${{ secrets.SIMKL_CLIENT_ID }}
          --dart-define=SIMKL_CLIENT_SECRET=${{ secrets.SIMKL_CLIENT_SECRET }}
        working-directory: packages/mobile

      - name: Package as IPA
        run: |
          cd packages/mobile/build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -ry ../../../Streame-iOS.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: Streame-iOS
          path: Streame-iOS.ipa

  # ─── Create GitHub Release ───────────────────────────────────────────────
  release:
    name:  Create Release
    needs: [windows, linux-x64, macos-arm64, macos-intel, ios]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            Streame-Windows-Installer/*.exe
            Streame-Linux-x64/*.AppImage
            Streame-macOS-arm64/*.dmg
            Streame-macOS-arm64/*.zip
            Streame-macOS-intel/*.dmg
            Streame-macOS-intel/*.zip
            Streame-iOS/*.ipa
