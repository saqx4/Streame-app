# ──────────────────────────────────────────────────────────────────────────────
#  PlayTorrio — Multi-Platform CI/CD
#  Builds: Android (split APK), Windows (installer), Linux x64 (AppImage),
#          macOS ARM64 (Apple Silicon)
#  TorrServer is downloaded fresh from GitHub releases during each build.
# ──────────────────────────────────────────────────────────────────────────────
name: Build PlayTorrio

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FLUTTER_CHANNEL: stable
  TORRSERVER_REPO: YouROK/TorrServer

# ═══════════════════════════════════════════════════════════════════════════════
jobs:

  # ─── Android ──────────────────────────────────────────────────────────────
  android:
    name:  Android (Split APKs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Download TorrServer for each ABI
        run: |
          TORR_URL="https://github.com/$TORRSERVER_REPO/releases/latest/download"
          mkdir -p android/app/src/main/jniLibs/{arm64-v8a,armeabi-v7a,x86_64}

          echo "⬇ arm64-v8a ..."
          curl -fSL "$TORR_URL/TorrServer-android-arm64" \
            -o android/app/src/main/jniLibs/arm64-v8a/libtorrserver.so

          echo "⬇ armeabi-v7a ..."
          curl -fSL "$TORR_URL/TorrServer-android-arm7" \
            -o android/app/src/main/jniLibs/armeabi-v7a/libtorrserver.so

          echo "⬇ x86_64 (Chromebooks / emulators) ..."
          curl -fSL "$TORR_URL/TorrServer-android-amd64" \
            -o android/app/src/main/jniLibs/x86_64/libtorrserver.so

          ls -lh android/app/src/main/jniLibs/*/libtorrserver.so

      - name: Tune Gradle for CI runner
        run: |
          cat > android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
          android.useAndroidX=true
          EOF

      - run: flutter pub get

      - name: Build split APKs
        run: |
          flutter build apk --release --split-per-abi \
            --obfuscate --split-debug-info=build/app/outputs/symbols

      - uses: actions/upload-artifact@v4
        with:
          name: PlayTorrio-Android-APKs
          path: build/app/outputs/flutter-apk/app-*-release.apk

  # ─── Windows ──────────────────────────────────────────────────────────────
  windows:
    name:  Windows (Installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Download TorrServer
        shell: pwsh
        run: |
          $torrUrl = "https://github.com/${{ env.TORRSERVER_REPO }}/releases/latest/download"
          New-Item -ItemType Directory -Force -Path assets\bin\windows | Out-Null
          Write-Host "Downloading TorrServer-windows-amd64.exe ..."
          Invoke-WebRequest "$torrUrl/TorrServer-windows-amd64.exe" -OutFile assets\bin\windows\TorrServer.exe

      - name: Enable Windows TorrServer asset
        shell: pwsh
        run: |
          (Get-Content pubspec.yaml -Raw) `
            -replace '#- assets/bin/windows/TorrServer\.exe', '- assets/bin/windows/TorrServer.exe' |
            Set-Content pubspec.yaml -NoNewline

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows\setup.iss

      - uses: actions/upload-artifact@v4
        with:
          name: PlayTorrio-Windows-Installer
          path: installer/windows/Output/PlayTorrio-Windows-Setup.exe

  # ─── Linux x64 ───────────────────────────────────────────────────────────
  linux-x64:
    name:  Linux x64 (AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libmpv-dev libsecret-1-dev libjsoncpp-dev \
            libwebkit2gtk-4.1-dev \
            libfuse2

      - name: Generate Linux platform files
        run: |
          flutter create --platforms=linux \
            --project-name play_torrio_native /tmp/ptgen
          cp -r /tmp/ptgen/linux ./

          # Fix binary name & window title
          sed -i 's/set(BINARY_NAME "play_torrio_native")/set(BINARY_NAME "PlayTorrio")/' \
            linux/CMakeLists.txt
          sed -i 's/set(APPLICATION_ID "com.example.play_torrio_native")/set(APPLICATION_ID "com.playtorrio.app")/' \
            linux/CMakeLists.txt
          sed -i 's/play_torrio_native/PlayTorrio/g' linux/my_application.cc

      - name: Download TorrServer
        run: |
          TORR_URL="https://github.com/$TORRSERVER_REPO/releases/latest/download"
          mkdir -p assets/bin/linux
          curl -fSL "$TORR_URL/TorrServer-linux-amd64" -o assets/bin/linux/TorrServer
          chmod +x assets/bin/linux/TorrServer

      - name: Enable Linux TorrServer asset
        run: |
          sed -i 's|#- assets/bin/linux/TorrServer|- assets/bin/linux/TorrServer|' pubspec.yaml

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package as AppImage
        run: |
          # Download appimagetool
          curl -fSL "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -o appimagetool
          chmod +x appimagetool

          # Create AppDir from Flutter bundle
          APP=PlayTorrio.AppDir
          mkdir -p "$APP"
          cp -r build/linux/x64/release/bundle/* "$APP/"
          cp assets/icon/icon.png "$APP/PlayTorrio.png"
          cp installer/linux/PlayTorrio.desktop "$APP/"

          # AppRun launcher
          printf '#!/bin/bash\ncd "$(dirname "$0")"\nexec ./PlayTorrio "$@"\n' \
            > "$APP/AppRun"
          chmod +x "$APP/AppRun"

          # Build the AppImage
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run \
            "$APP" PlayTorrio-Linux-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: PlayTorrio-Linux-x64
          path: PlayTorrio-Linux-x86_64.AppImage

  # ─── macOS ARM64 (Apple Silicon) ─────────────────────────────────────────
  macos-arm64:
    name:  macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Generate macOS platform files
        run: |
          flutter create --platforms=macos \
            --project-name play_torrio_native /tmp/ptgen
          cp -r /tmp/ptgen/macos ./

          # Network entitlements (TorrServer runs a local TCP server)
          for f in macos/Runner/DebugProfile.entitlements macos/Runner/Release.entitlements; do
            plutil -replace 'com.apple.security.network.server' -bool true "$f"
            plutil -replace 'com.apple.security.network.client' -bool true "$f"
          done

          # App name
          plutil -replace CFBundleName -string 'PlayTorrio' \
            macos/Runner/Info.plist

      - name: Download TorrServer
        run: |
          TORR_URL="https://github.com/$TORRSERVER_REPO/releases/latest/download"
          mkdir -p assets/bin/macos
          curl -fSL "$TORR_URL/TorrServer-darwin-arm64" -o assets/bin/macos/TorrServer
          chmod +x assets/bin/macos/TorrServer

      - name: Enable macOS TorrServer asset
        run: |
          sed -i '' 's|#- assets/bin/macos/TorrServer|- assets/bin/macos/TorrServer|' pubspec.yaml

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          mv play_torrio_native.app PlayTorrio.app
          zip -ry ../../../../../PlayTorrio-macOS-arm64.zip PlayTorrio.app

      - uses: actions/upload-artifact@v4
        with:
          name: PlayTorrio-macOS-arm64
          path: PlayTorrio-macOS-arm64.zip

  # ─── Create GitHub Release ───────────────────────────────────────────────
  release:
    name:  Create Release
    needs: [android, windows, linux-x64, macos-arm64]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            PlayTorrio-Android-APKs/*.apk
            PlayTorrio-Windows-Installer/*.exe
            PlayTorrio-Linux-x64/*.AppImage
            PlayTorrio-macOS-arm64/*.zip
