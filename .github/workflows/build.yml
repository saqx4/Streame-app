  # ─── macOS ARM64 (Apple Silicon) ─────────────────────────────────────────
  macos-arm64:
    name:  macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Configure macOS platform files
        run: |
          # Regenerate platform scaffolding only if macos/ folder is missing
          if [ ! -d "macos" ]; then
            flutter create --platforms=macos .
          fi

          # ── Entitlements ──
          for f in macos/Runner/DebugProfile.entitlements macos/Runner/Release.entitlements; do
            # Disable sandbox
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.app-sandbox" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.app-sandbox bool false" "$f"

            # Hardened runtime: allow JIT (Flutter engine needs this)
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.cs.allow-jit" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.cs.allow-jit bool true" "$f"

            # Network: client (torrent peer connections + API calls)
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.network.client" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.client bool true" "$f"

            # Network: server (libtorrent HTTP stream server)
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.network.server" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.server bool true" "$f"
          done

          # ── App name ──
          /usr/libexec/PlistBuddy -c "Set :CFBundleName PlayTorrio" \
            macos/Runner/Info.plist || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleName string PlayTorrio" \
            macos/Runner/Info.plist

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Package as DMG
        run: |
          cd build/macos/Build/Products/Release
          mv play_torrio_native.app PlayTorrio.app

          # Ad-hoc sign the entire .app bundle (deep) so macOS doesn't kill it on launch.
          # --deep signs all nested frameworks/binaries inside the bundle.
          codesign --sign - --force --deep PlayTorrio.app
          
          # Create DMG using hdiutil (built into macOS)
          mkdir -p dmg_temp
          cp -R PlayTorrio.app dmg_temp/
          
          # Create Applications symlink for drag-and-drop install
          ln -s /Applications dmg_temp/Applications
          
          # Create DMG
          hdiutil create -volname "PlayTorrio" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            ../../../../../PlayTorrio-macOS-arm64.dmg
          
          # Also create ZIP as backup
          zip -ry ../../../../../PlayTorrio-macOS-arm64.zip PlayTorrio.app

      - uses: actions/upload-artifact@v4
        with:
          name: PlayTorrio-macOS-arm64
          path: |
            PlayTorrio-macOS-arm64.dmg
            PlayTorrio-macOS-arm64.zip

  # ─── macOS Intel (x86_64 via Rosetta 2) ─────────────────────────────────
  # GitHub no longer offers Intel macOS runners (macos-13 deprecated).
  # We cross-compile on the ARM64 runner using Rosetta 2 + x64 Flutter SDK.
  macos-intel:
    name:  macOS (Intel)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rosetta 2
        run: softwareupdate --install-rosetta --agree-to-license || true

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          architecture: x64

      - name: Configure macOS platform files
        run: |
          if [ ! -d "macos" ]; then
            flutter create --platforms=macos .
          fi

          for f in macos/Runner/DebugProfile.entitlements macos/Runner/Release.entitlements; do
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.app-sandbox" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.app-sandbox bool false" "$f"
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.cs.allow-jit" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.cs.allow-jit bool true" "$f"
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.network.client" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.client bool true" "$f"
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.network.server" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.server bool true" "$f"
          done

          /usr/libexec/PlistBuddy -c "Set :CFBundleName PlayTorrio" \
            macos/Runner/Info.plist || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleName string PlayTorrio" \
            macos/Runner/Info.plist

      - run: arch -x86_64 flutter pub get
      - run: arch -x86_64 flutter build macos --release

      - name: Package as DMG
        run: |
          cd build/macos/Build/Products/Release
          mv play_torrio_native.app PlayTorrio.app

          codesign --sign - --force --deep PlayTorrio.app

          mkdir -p dmg_temp
          cp -R PlayTorrio.app dmg_temp/
          ln -s /Applications dmg_temp/Applications

          hdiutil create -volname "PlayTorrio" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            ../../../../../PlayTorrio-macOS-intel.dmg

          zip -ry ../../../../../PlayTorrio-macOS-intel.zip PlayTorrio.app

      - uses: actions/upload-artifact@v4
        with:
          name: PlayTorrio-macOS-intel
          path: |
            PlayTorrio-macOS-intel.dmg
            PlayTorrio-macOS-intel.zip

  # ─── iOS (Sideloadable IPA — no signing) ─────────────────────────────────
  ios:
    name:  iOS (IPA)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Generate iOS platform files
        run: |
          if [ ! -d "ios" ]; then
            flutter create --platforms=ios .
          fi

          # ── Set bundle ID & display name ──
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.playtorrio.app" \
            ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string com.playtorrio.app" \
            ios/Runner/Info.plist

          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName PlayTorrio" \
            ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string PlayTorrio" \
            ios/Runner/Info.plist

          /usr/libexec/PlistBuddy -c "Set :CFBundleName PlayTorrio" \
            ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleName string PlayTorrio" \
            ios/Runner/Info.plist

          # ── Allow localhost networking (libtorrent local HTTP server) ──
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" \
            ios/Runner/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSAllowsLocalNetworking true" \
            ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsLocalNetworking bool true" \
            ios/Runner/Info.plist

          # ── Network entitlements for libtorrent_flutter ──
          cat > ios/Runner/Runner.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>com.apple.security.network.client</key>
          	<true/>
          </dict>
          </plist>
          EOF

      - run: flutter pub get

      # ── Release build ────────────────────────────────────────────────────
      - run: flutter build ios --release --no-codesign

      - name: Package as IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -ry ../../../PlayTorrio-iOS.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: PlayTorrio-iOS
          path: PlayTorrio-iOS.ipa

  # ─── Create GitHub Release ───────────────────────────────────────────────
  release:
    name:  Create Release
    needs: [windows, macos-arm64, macos-intel, ios]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            PlayTorrio-Windows-Installer/*.exe
            PlayTorrio-macOS-arm64/*.dmg
            PlayTorrio-macOS-arm64/*.zip
            PlayTorrio-macOS-intel/*.dmg
            PlayTorrio-macOS-intel/*.zip
            PlayTorrio-iOS/*.ipa
